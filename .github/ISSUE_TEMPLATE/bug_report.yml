name: Bug Report
description: Report a bug in Prosponsive
labels: [bug, triage]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: input
    id: app-version
    attributes:
      label: App Version
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: ai-provider
    attributes:
      label: AI Provider
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: ai-model
    attributes:
      label: AI Model
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: total-ram
    attributes:
      label: Total RAM
      description: Auto-populated by Prosponsive app
    validations:
      required: false
  - type: input
    id: cpu-cores
    attributes:
      label: CPU Cores
      description: Auto-populated by Prosponsive app
    validations:
      required: false
